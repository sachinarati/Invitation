<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin & Aarti | Wedding Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&family=Poppins:wght@300;400&display=swap');

        :root {
            --gold: #c5a059;
            --deep-red: #4a0404;
            --bg: #fdfbf7;
            --envelope-bg: #5d0505;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg); font-family: 'Poppins', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        /* The Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 350px; height: 250px;
            background: var(--envelope-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        /* The Flap */
        .envelope-flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 130px solid var(--deep-red);
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 30;
        }

        /* The Seal */
        .seal {
            position: absolute; top: 110px; left: 155px;
            width: 40px; height: 40px; background: var(--gold);
            border-radius: 50%; z-index: 40;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.8rem; font-weight: bold;
            transition: opacity 0.4s;
        }

        /* The Letter Card */
        .invitation-card {
            position: absolute; top: 10px; left: 10px;
            width: 330px; background: white;
            padding: 40px 20px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.8s ease-in-out;
            z-index: 10; border: 1px solid #eee;
            box-sizing: border-box;
        }

        /* Interactive Animation States */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 5;
        }

        .envelope-wrapper.open .invitation-card {
            transform: translateY(-280px); /* Slide up animation */
            z-index: 20;
        }

        .envelope-wrapper.open .seal {
            opacity: 0;
        }

        /* Typography Inside Card */
        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--deep-red); margin: 0; }
        .names { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; margin: 15px 0; color: #333; }
        .details { margin: 20px 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; padding: 15px 0; font-size: 0.9rem; }
        .date { font-weight: bold; color: var(--gold); font-size: 1.2rem; }
        
        .hint {
            position: absolute; bottom: -40px; width: 100%;
            text-align: center; color: var(--deep-red); font-weight: 600;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .btn {
            background: var(--deep-red); color: white; padding: 10px 20px;
            text-decoration: none; border-radius: 5px; font-size: 0.8rem;
            display: inline-block; margin-top: 10px;
        }

        /* Mobile specific tweak */
        @media (max-width: 400px) {
            .envelope-wrapper { width: 300px; height: 215px; }
            .envelope-flap { border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 110px solid var(--deep-red); }
            .invitation-card { width: 280px; }
            .seal { left: 130px; top: 95px; }
            .envelope-wrapper.open .invitation-card { transform: translateY(-250px); }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
        <div class="envelope-flap"></div>
        <div class="seal">S & A</div>
        
        <div class="invitation-card">
            <h1>Wedding Invitation</h1>
            <div class="names">Sachin <span style="color:var(--gold)">&</span> Aarti</div>
            <p style="font-size: 0.8rem;">Request the honor of your presence</p>
            
            <div class="details">
                <div class="date">29th March 2026</div>
                <div class="venue">
                    <strong>Shiv Chhatrapati Mangal Karyalaya</strong><br>
                    Pune, Maharashtra
                </div>
            </div>

            <a href="https://maps.google.com" target="_blank" class="btn">View Venue</a>
        </div>

        <div class="hint" id="hint-text">Tap to Open ✨</div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.getElementById('envelope');
            const hint = document.getElementById('hint-text');
            
            env.classList.toggle('open');
            
            if(env.classList.contains('open')) {
                hint.style.display = 'none';
                // Allow scrolling after opening if card is long
                document.body.style.overflow = 'visible';
            } else {
                hint.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }
    </script>
</body>
</html>
