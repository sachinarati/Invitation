<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin & Aarti | The Wedding</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@0,400;1,600&display=swap');

        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --cream: #f9f7f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            color: var(--dark);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Loading Animation */
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cream); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOut 1.5s forwards 2s;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(249,247,242,0.8), rgba(249,247,242,0.8));
        }

        .hero h2 {
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            font-size: 1rem;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-style: italic;
            margin-bottom: 10px;
        }

        .scroll-hint {
            position: absolute; bottom: 30px;
            font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase; opacity: 0.5;
            animation: bounce 2s infinite;
        }

        /* Details Section */
        .details-sec {
            background: var(--dark);
            color: var(--cream);
        }

        .details-sec h3 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
        }

        .info-block {
            margin: 20px 0;
            line-height: 2;
        }

        .date-big {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            color: var(--gold);
        }

        .venue-name {
            font-weight: 200;
            letter-spacing: 2px;
            font-size: 1.1rem;
            max-width: 300px;
        }

        .map-btn {
            margin-top: 40px;
            padding: 15px 35px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.4s;
        }

        .map-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Reveal Animation on Scroll */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.5s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
            .date-big { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="loader">
        <h1 style="font-family: 'Cinzel'; font-weight: 400; letter-spacing: 10px;">S & A</h1>
    </div>

    <section class="hero">
        <h2>Save the Date</h2>
        <h1>Sachin & Aarti</h1>
        <p style="letter-spacing: 2px; font-weight: 200;">ARE GETTING MARRIED</p>
        <div class="scroll-hint">Scroll to Begin</div>
    </section>

    <section class="details-sec">
        <div class="reveal">
            <h3>The Ceremony</h3>
            <div class="info-block">
                <p>Join us on</p>
                <div class="date-big">29 . 03 . 2026</div>
                <p>at 11:30 in the morning</p>
            </div>
            
            <div class="info-block">
                <p style="color: var(--gold); margin-bottom: 10px;">at</p>
                <div class="venue-name">Shiv Chhatrapati Mangal Karyalaya, Pune</div>
            </div>

            <a href="https://maps.google.com" target="_blank" class="map-btn">View Location</a>
        </div>
    </section>

    <section style="height: 50vh;">
        <p style="font-family: 'Playfair Display'; font-style: italic; font-size: 1.2rem;">
            "Together is a beautiful place to be."
        </p>
        <div style="margin-top: 30px; font-size: 0.7rem; opacity: 0.5;">MADE FOR AARTI & SACHIN</div>
    </section>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
    </script>
</body>
</html>
