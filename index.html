<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding | Sachin & Aarti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Montserrat:wght@300;500&display=swap');

        :root {
            --royal-gold: #d4af37;
            --palace-red: #6a0505;
            --cream: #fff9f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            color: var(--palace-red);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Elegant Falling Flowers --- */
        .flower {
            position: fixed; top: -10%; font-size: 20px;
            animation: fall 12s linear infinite; z-index: 1; opacity: 0.6;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* --- Hero Section --- */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .hero-bg {
            background: linear-gradient(rgba(255,249,240,0.8), rgba(255,249,240,0.8));
            border-bottom: 1px solid var(--royal-gold);
        }

        .hero-content h2 {
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 5px;
            font-size: 1.2rem;
            color: var(--royal-gold);
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Cinzel Decorative', serif;
            font-size: 4.5rem;
            margin: 20px 0;
            background: linear-gradient(to right, #8e0e0e, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Details Section (Reveal) --- */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: 1.5s all ease;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: white;
            border: 1px solid var(--royal-gold);
            padding: 50px 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border-radius: 5px;
            max-width: 450px;
            width: 90%;
        }

        .date-shloka {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.8rem;
            color: var(--palace-red);
            margin: 20px 0;
        }

        .map-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--palace-red);
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        /* --- Scroll Indicator --- */
        .scroll-down {
            position: absolute; bottom: 30px;
            font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase; opacity: 0.6;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }

        @media (max-width: 600px) {
            .names { font-size: 3.2rem; }
            .date-shloka { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="flower" style="left: 10%; animation-duration: 10s;">🌸</div>
    <div class="flower" style="left: 30%; animation-duration: 11s;">🌼</div>
    <div class="flower" style="left: 70%; animation-duration: 12s;">🌸</div>
    <div class="flower" style="left: 90%; animation-duration: 13s;">🌼</div>
    <div class="flower" style="left: 10%; animation-duration: 14s;">🌸</div>
    <div class="flower" style="left: 30%; animation-duration: 15s;">🌼</div>
    <div class="flower" style="left: 70%; animation-duration: 16s;">🌸</div>
    <div class="flower" style="left: 90%; animation-duration: 17s;">🌼</div>

    <section class="hero-bg">
        <div class="hero-content">
            <h2>Shree Ganeshay Namah</h2>
            <p style="letter-spacing: 3px; opacity: 0.7;">WEDDING INVITATION</p>
            <h1 class="names">Sachin & Aarti</h1>
            <p style="font-style: italic;">"A journey of a thousand miles begins with a single step..."</p>
        </div>
        <div class="scroll-down">Scroll for Invitation</div>
    </section>

    <section>
        <div class="card reveal">
            <h2 style="font-family: 'Cinzel Decorative'; font-size: 1rem; color: var(--royal-gold);">Shubh Muhurat</h2>
            <div class="date-shloka">29 . 04 . 2026</div>
            <p style="font-weight: 500; margin-bottom: 20px;">At 12:32 PM onwards</p>
            
            <p style="margin-bottom: 5px; opacity: 0.6;">VENUE</p>
            <p style="font-weight: bold; letter-spacing: 1px;">Shiv Chhatrapati Mangal Karyalaya<br>Pune, Maharashtra</p>
            
            <a href="https://maps.app.goo.gl/3d5FqfmzVr2voYebA" target="_blank" class="map-btn">VIEW LOCATION</a>
        </div>
    </section>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
